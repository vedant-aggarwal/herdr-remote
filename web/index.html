<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>herdr-remote</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100dvh; display: flex; flex-direction: column; }
.header { padding: 12px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; }
.header h1 { font-size: 1rem; flex: 1; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot.green { background: #22c55e; } .dot.red { background: #ef4444; } .dot.orange { background: #f97316; }

.connect-bar { padding: 8px 16px; display: flex; gap: 8px; border-bottom: 1px solid #222; }
.connect-bar input { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #e5e5e5; font-size: 13px; }
.connect-bar button { padding: 8px 12px; border-radius: 6px; border: none; background: #22c55e; color: #000; font-weight: 600; font-size: 13px; }

.view { flex: 1; overflow-y: auto; }

/* Agent list */
.agents { padding: 12px; }
.section-header { font-size: 0.65rem; text-transform: uppercase; color: #666; margin: 12px 0 6px; display: flex; align-items: center; gap: 5px; }
.agent { background: #1a1a1a; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.agent:active { background: #2a2a2a; }
.agent .info { flex: 1; }
.agent .project { font-size: 0.85rem; font-weight: 500; }
.agent .meta { font-size: 0.65rem; color: #888; }

/* Terminal view */
.terminal-view { display: none; flex-direction: column; height: 100%; }
.terminal-view.active { display: flex; flex: 1; }
.term-header { padding: 10px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
.term-header .back { background: none; border: none; color: #3b82f6; font-size: 1.2rem; cursor: pointer; padding: 4px 8px; }
.term-header .title { flex: 1; font-size: 0.85rem; font-weight: 500; }
.term-header .refresh-btn { background: none; border: none; color: #888; font-size: 1rem; cursor: pointer; }
.term-content { flex: 1; overflow-y: auto; padding: 8px 12px; background: #000; font-family: 'SF Mono', 'Menlo', monospace; font-size: 11px; line-height: 1.4; white-space: pre-wrap; color: #ccc; }
.term-input { border-top: 1px solid #333; padding: 8px 12px; display: flex; gap: 6px; }
.term-input input { flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #e5e5e5; font-size: 14px; font-family: monospace; }
.term-input button { padding: 8px 12px; border-radius: 6px; border: none; background: #3b82f6; color: #fff; font-weight: 600; }

/* Special keyboard */
.term-keys { border-top: 1px solid #222; padding: 8px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; background: #111; }
.term-keys button { padding: 8px 14px; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #e5e5e5; font-size: 13px; cursor: pointer; min-width: 44px; }
.term-keys button:active { background: #333; }
.term-keys .wide { flex: 1; max-width: 120px; }

/* Quick actions for blocked */
.quick-actions { padding: 8px 12px; border-top: 1px solid #222; display: flex; gap: 6px; flex-wrap: wrap; }
.quick-actions button { padding: 10px 14px; border-radius: 8px; border: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; flex: 1; min-width: 80px; }
.btn-yes { background: #22c55e; color: #000; }
.btn-trust { background: #3b82f6; color: #fff; }
.btn-no { background: #ef4444; color: #fff; }
</style>
</head>
<body>

<div class="header">
  <span class="dot" id="statusDot"></span>
  <h1>🐑 herdr-remote</h1>
  <span id="agentCount" style="font-size:0.7rem;color:#888"></span>
</div>

<div class="connect-bar" id="connectBar">
  <input id="relayUrl" type="url" placeholder="wss://your-tunnel.trycloudflare.com" />
  <button onclick="connect()">Connect</button>
</div>

<div class="view" id="agentListView">
  <div class="agents" id="agents"></div>
</div>

<div class="terminal-view" id="terminalView">
  <div class="term-header">
    <button class="back" onclick="closeTerminal()">‹</button>
    <span class="title" id="termTitle"></span>
    <button class="refresh-btn" onclick="refreshPane()">↻</button>
  </div>
  <div class="term-content" id="termContent">Loading…</div>
  <div class="quick-actions" id="quickActions"></div>
  <div class="term-input">
    <input id="termInput" placeholder="Type command…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
    <button onclick="sendText()">⏎</button>
  </div>
  <div class="term-keys">
    <button onclick="sendKey('Up')">↑</button>
    <button onclick="sendKey('Down')">↓</button>
    <button onclick="sendKey('Left')">←</button>
    <button onclick="sendKey('Right')">→</button>
    <button onclick="sendKey('Enter')">Enter</button>
    <button onclick="sendKey('Tab')">Tab</button>
    <button onclick="sendKey('Escape')">Esc</button>
    <button onclick="sendKeys(['Ctrl+c'])">^C</button>
    <button onclick="sendKey('y')">y</button>
    <button onclick="sendKey('n')">n</button>
  </div>
</div>

<script>
let ws = null, agents = [], activePane = null, refreshInterval = null;

const saved = localStorage.getItem('herdr_relay_url') || 'wss://carmen-shape-marcus-centuries.trycloudflare.com';
document.getElementById('relayUrl').value = saved;

function connect() {
  const url = document.getElementById('relayUrl').value.trim();
  if (!url) return;
  localStorage.setItem('herdr_relay_url', url);
  if (ws) ws.close();
  setStatus('connecting');
  ws = new WebSocket(url);
  ws.onopen = () => setStatus('connected');
  ws.onclose = () => { setStatus('disconnected'); setTimeout(connect, 3000); };
  ws.onerror = () => setStatus('disconnected');
  ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
}

function setStatus(s) {
  document.getElementById('statusDot').className = 'dot ' + (s==='connected'?'green':s==='connecting'?'orange':'red');
}

function handleMessage(msg) {
  if (msg.type === 'agents') { agents = msg.agents; render(); }
  else if (msg.type === 'blocked') {
    const a = agents.find(x => x.pane_id === msg.pane_id);
    if (a) { a.status = 'blocked'; a.prompt = msg.prompt; a.options = msg.options; }
    else agents.push({...msg, status: 'blocked'});
    render();
  } else if (msg.type === 'pane_content' && msg.pane_id === activePane) {
    document.getElementById('termContent').textContent = msg.content || '(empty)';
    document.getElementById('termContent').scrollTop = 99999;
  }
}

function render() {
  const blocked = agents.filter(a => a.status === 'blocked');
  const working = agents.filter(a => a.status === 'working');
  const idle = agents.filter(a => a.status === 'idle' || a.status === 'unknown');
  document.getElementById('agentCount').textContent = `${agents.length} agents`;
  let html = '';
  if (blocked.length) html += section('Blocked', '#ef4444', blocked);
  if (working.length) html += section('Working', '#22c55e', working);
  if (idle.length) html += section('Idle', '#888', idle);
  if (!agents.length) html = '<div style="text-align:center;color:#666;padding:60px 20px">No agents</div>';
  document.getElementById('agents').innerHTML = html;
}

function section(title, color, list) {
  return `<div class="section-header"><span class="dot" style="background:${color}"></span>${title}</div>` +
    list.map(a => {
      const host = a.host && a.host !== 'local' ? ` <span style="color:#f97316;font-size:0.6rem">@${a.host}</span>` : '';
      return `<div class="agent" onclick="openTerminal('${a.pane_id}')">
        <span class="dot" style="background:${color}"></span>
        <div class="info"><div class="project">${a.project || a.agent}${host}</div><div class="meta">${a.agent} · ${a.status}</div></div>
      </div>`;
    }).join('');
}

function openTerminal(paneId) {
  activePane = paneId;
  const a = agents.find(x => x.pane_id === paneId);
  document.getElementById('termTitle').textContent = a ? `${a.project} · ${a.agent}` : paneId;
  document.getElementById('agentListView').style.display = 'none';
  document.getElementById('terminalView').classList.add('active');
  document.getElementById('connectBar').style.display = 'none';

  // Show quick actions if blocked
  const qa = document.getElementById('quickActions');
  if (a && a.status === 'blocked') {
    const opts = a.options || ['yes, single permission', 'trust, always allow', 'no (tab to edit)'];
    qa.innerHTML = opts.map(o => {
      const cls = o.includes('yes')||o.includes('approve')?'btn-yes':o.includes('trust')?'btn-trust':'btn-no';
      return `<button class="${cls}" onclick="respond('${o.replace(/'/g,"\\'")}')">${o.split(',')[0]}</button>`;
    }).join('');
  } else { qa.innerHTML = ''; }

  refreshPane();
  refreshInterval = setInterval(refreshPane, 3000);
  document.getElementById('termInput').focus();
}

function closeTerminal() {
  activePane = null;
  clearInterval(refreshInterval);
  document.getElementById('terminalView').classList.remove('active');
  document.getElementById('agentListView').style.display = '';
  document.getElementById('connectBar').style.display = '';
}

function refreshPane() {
  if (!ws || !activePane) return;
  ws.send(JSON.stringify({ type: 'read_pane', pane_id: activePane, lines: 40 }));
}

function sendText() {
  const input = document.getElementById('termInput');
  if (!input.value || !ws || !activePane) return;
  ws.send(JSON.stringify({ type: 'send_text', pane_id: activePane, text: input.value + '\n' }));
  input.value = '';
  setTimeout(refreshPane, 500);
}

function sendKey(key) {
  if (!ws || !activePane) return;
  ws.send(JSON.stringify({ type: 'send_keys', pane_id: activePane, keys: [key] }));
  setTimeout(refreshPane, 300);
}

function sendKeys(keys) {
  if (!ws || !activePane) return;
  ws.send(JSON.stringify({ type: 'send_keys', pane_id: activePane, keys }));
  setTimeout(refreshPane, 300);
}

function respond(text) {
  if (!ws || !activePane) return;
  ws.send(JSON.stringify({ type: 'respond', pane_id: activePane, text }));
  document.getElementById('quickActions').innerHTML = '';
  setTimeout(refreshPane, 500);
}

document.getElementById('termInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); sendText(); }
});

setTimeout(connect, 100);
</script>
</body>
</html>
